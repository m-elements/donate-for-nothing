<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Donate For Nothing</title>
<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#090909;
    color:#f5e7a1;
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    background:linear-gradient(180deg,#080808,#1a1404);
}

.card{
    width:min(92%,420px);
    background:#111;
    border:1px solid #d4af37;
    border-radius:20px;
    padding:22px;
    box-shadow:0 0 25px rgba(212,175,55,.35);
}

h1{text-align:center;margin:0;}
.tag{text-align:center;color:#ddd}
.qr{display:block;width:230px;max-width:100%;margin:18px auto;border-radius:12px;border:3px solid #d4af37}
.upi{background:#1b1b1b;padding:10px;border-radius:10px;text-align:center;word-break:break-all}

/* Buttons style */
button{
    width:100%;
    margin-top:12px;
    padding:13px;
    border:none;
    border-radius:12px;
    background:#d4af37;
    color:#111;
    font-weight:bold;
    cursor:pointer;
    transition: transform 0.2s;
}
button:active{
    transform: scale(0.98);
}

#shareBtn {
    background: linear-gradient(45deg, #d4af37, #ffd700);
    box-shadow: 0 0 20px rgba(212, 175, 55, 0.4);
}

footer{text-align:center;margin-top:18px;color:#c8b46a;font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#d4af37;color:#111;padding:10px 18px;border-radius:10px;display:none;z-index:10000}

/* Loading Screen Styles */
#loading-screen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#050505;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    color:#d4af37;
    transition: opacity 0.5s ease, visibility 0.5s ease; /* Smooth Fade Out */
}

.loader-ring{
    width:70px;
    height:70px;
    border:5px solid #222;
    border-top:5px solid #d4af37;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:20px;
}

@keyframes spin{
    100%{transform:rotate(360deg)}
}

#loading-screen h2{
    font-size:28px;
    letter-spacing:2px;
    margin: 0;
}

#loading-screen p{
    color:#aaa;
    margin-top:10px;
}
</style>
</head>
<body>

<!-- Premium Loader Screen -->
<div id="loading-screen">
  <div class="loader-ring"></div>
  <h2>Donate For Nothing</h2>
  <p>Loading Premium Experience...</p>
</div>

<!-- Main Card Content -->
<div class="card">
    <h1>Donate For Nothing</h1>
    <p class="tag">Donate any amount and receive absolutely NOTHING.</p>
    <img class="qr" src="1000281010jpg.jpg" alt="QR">
    <div class="upi" id="upi">manurathour99@fam</div>
    
    <button onclick="copyUPI()">Copy UPI</button>
    <button id="shareBtn">Share This Page</button>
    
    <footer>Owner & Developer: Manu Singh Rathour</footer>
</div>

<div class="toast" id="t">UPI Copied ✅</div>

<script>
// Copy UPI Functionality
function copyUPI(){
    navigator.clipboard.writeText("manurathour99@fam");
    let t=document.getElementById("t");
    t.style.display="block";
    setTimeout(()=>t.style.display="none",1800);
}

// Loader fade-out on window load
window.addEventListener("load", function(){
    setTimeout(function(){
        const loader = document.getElementById("loading-screen");
        if(loader){
            loader.style.opacity = "0";
            loader.style.visibility = "hidden";
            setTimeout(function(){
                loader.style.display = "none";
            }, 500);
        }
    }, 1500); // 1.5 seconds loader delay for premium feel
});

// Share Button logic
document.getElementById("shareBtn").addEventListener("click", async () => {
    if (navigator.share) {
        try {
            await navigator.share({
                title: 'Donate For Nothing',
                text: 'Donate any amount and receive absolutely NOTHING!',
                url: window.location.href
            });
        } catch (err) {
            console.log("Error sharing:", err);
        }
    } else {
        // Fallback for browsers that don't support native share
        navigator.clipboard.writeText(window.location.href);
        alert("Link copied to clipboard! Share it with your friends.");
    }
});
</script>
</body>
</html>
    },1500);
});
</body>
</html>
