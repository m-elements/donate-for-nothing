<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Donate For Nothing</title>
<style>
*{box-sizing:border-box}
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#05070f;
    color:#d1f0ff; /* Soft Ice Blue Text */
    display:flex;
    align-items:center;
    justify-content:center;
    min-height:100vh;
    background:linear-gradient(180deg,#04060c,#0c1322);
}

.card{
    width:min(92%,420px);
    background:#0d111a; /* Deep Space Blue-Black Card */
    border:1px solid #00f2fe; /* Cyber Sapphire Border */
    border-radius:20px;
    padding:22px;
    box-shadow:0 0 25px rgba(0, 242, 254, 0.25); /* Cyan Glow */
}

h1{text-align:center;margin:0;color:#00f2fe;}
.tag{text-align:center;color:#a3c5d8}
.qr{display:block;width:230px;max-width:100%;margin:18px auto;border-radius:12px;border:3px solid #00f2fe}
.upi{background:#121824;padding:10px;border-radius:10px;text-align:center;word-break:break-all;color:#00f2fe}

/* Buttons style with smooth press animation */
button{
    width:100%;
    margin-top:12px;
    padding:13px;
    border:none;
    border-radius:12px;
    background:#00d2ff;
    color:#050814;
    font-weight:bold;
    cursor:pointer;
    transition: transform 0.1s ease, box-shadow 0.2s;
}
button:active{
    transform: scale(0.95); /* Button click zoom-out effect */
}

#shareBtn {
    background: linear-gradient(45deg, #0072ff, #00f2fe);
    color: #050814;
    box-shadow: 0 0 20px rgba(0, 242, 254, 0.4);
}

footer{text-align:center;margin-top:18px;color:#709cb5;font-size:13px}
.toast{position:fixed;bottom:20px;left:50%;transform:translateX(-50%);background:#00f2fe;color:#050814;padding:10px 18px;border-radius:10px;display:none;z-index:10000;font-weight:bold}

/* Loading Screen Styles */
#loading-screen{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:#03050a;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    z-index:9999;
    color:#00f2fe;
    transition: opacity 0.5s ease, visibility 0.5s ease;
}

.loader-ring{
    width:70px;
    height:70px;
    border:5px solid #101726;
    border-top:5px solid #00f2fe;
    border-radius:50%;
    animation:spin 1s linear infinite;
    margin-bottom:20px;
}

@keyframes spin{
    100%{transform:rotate(360deg)}
}

#loading-screen h2{
    font-size:28px;
    letter-spacing:2px;
    margin: 0;
}

#loading-screen p{
    color:#709cb5;
    margin-top:10px;
}
</style>
</head>
<body>

<!-- Premium Loader Screen -->
<div id="loading-screen">
  <div class="loader-ring"></div>
  <h2>Donate For Nothing</h2>
  <p>Loading Premium Experience...</p>
</div>

<!-- Main Card Content -->
<div class="card">
    <h1>Donate For Nothing</h1>
    <p class="tag">Donate any amount and receive absolutely NOTHING.</p>
    
    <!-- Dynamic QR Code -->
    <img class="qr" src="https://api.qrserver.com/v1/create-qr-code/?size=230x230&data=upi%3A%2F%2Fpay%3Fpa%3Dmanurathour99%40fam%26pn%3DManu%26cu%3DINR" alt="QR">
    
    <div class="upi" id="upi">manurathour99@fam</div>
    
    <button onclick="copyUPI()">Copy UPI</button>
    <button id="shareBtn">Share This Page</button>
    
    <footer>Owner & Developer: Manu Singh Rathour</footer>
</div>

<div class="toast" id="t">UPI Copied ✅</div>

<script>
// Web Audio API: Dynamic Click Sound Generator
function playClickSound() {
    try {
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        const oscillator = audioCtx.createOscillator();
        const gainNode = audioCtx.createGain();
        
        oscillator.type = 'sine'; // Clear and sweet sound
        
        // High pitch tap sound (like premium app tap)
        oscillator.frequency.setValueAtTime(1500, audioCtx.currentTime); 
        oscillator.frequency.exponentialRampToValueAtTime(500, audioCtx.currentTime + 0.08);
        
        // Quick fade-out so it sounds like a sharp "tick"
        gainNode.gain.setValueAtTime(0.15, audioCtx.currentTime); 
        gainNode.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.08);
        
        oscillator.connect(gainNode);
        gainNode.connect(audioCtx.destination);
        
        oscillator.start();
        oscillator.stop(audioCtx.currentTime + 0.08);
    } catch (e) {
        console.log("Audio not supported or blocked by browser:", e);
    }
}

// Copy UPI Functionality
function copyUPI(){
    playClickSound(); // Play sound
    navigator.clipboard.writeText("manurathour99@fam");
    let t=document.getElementById("t");
    t.style.display="block";
    setTimeout(()=>t.style.display="none",1800);
}

// Loader fade-out
window.addEventListener("load", function(){
    setTimeout(function(){
        const loader = document.getElementById("loading-screen");
        if(loader){
            loader.style.opacity = "0";
            loader.style.visibility = "hidden";
            setTimeout(function(){
                loader.style.display = "none";
            }, 500);
        }
    }, 1500);
});

// Share Button logic
document.getElementById("shareBtn").addEventListener("click", async () => {
    playClickSound(); // Play sound
    if (navigator.share) {
        try {
            await navigator.share({
                title: 'Donate For Nothing',
                text: 'Donate any amount and receive absolutely NOTHING!',
                url: window.location.href
            });
        } catch (err) {
            console.log("Error sharing:", err);
        }
    } else {
        navigator.clipboard.writeText(window.location.href);
        alert("Link copied to clipboard! Share it with your friends.");
    }
});
</script>
</body>
</html>
